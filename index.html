<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Arena Map</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0a;
    color: #00ff41;
    font-family: monospace;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  .header {
    height: 50px;
    border-bottom: 1px solid #00ff41;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: #050505;
    flex-shrink: 0;
  }

  .container {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* MAP */
  #map {
    flex: 1;
    height: 100%;
    min-height: 400px;
    background: #0a0a0a;
  }

  /* EVENT PANEL */
  .panel {
    width: 320px;
    border-left: 1px solid #00ff41;
    background: #050505;
    overflow-y: auto;
    padding: 12px;
  }

  .panel h2 {
    font-size: 14px;
    margin-bottom: 12px;
    border-bottom: 1px solid #00ff41;
    padding-bottom: 8px;
    letter-spacing: 1px;
  }

  .log {
    margin-bottom: 12px;
    padding: 10px;
    border: 1px solid rgba(0, 255, 65, 0.25);
    background: rgba(0, 255, 65, 0.03);
  }

  .log-type {
    color: #00ff41;
    font-weight: bold;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .log-event {
    color: #b7ffcb;
    font-size: 13px;
    line-height: 1.4;
  }

  .log-meta {
    margin-top: 6px;
    font-size: 11px;
    color: rgba(0,255,65,0.6);
  }

  /* LEAFLET CUSTOM */
  .leaflet-container {
    background: #0a0a0a !important;
  }

  .leaflet-popup-content-wrapper {
    background: #050505;
    color: #00ff41;
    border: 1px solid #00ff41;
    border-radius: 0;
  }

  .leaflet-popup-tip {
    background: #00ff41;
  }

  /* MOBILE */
  @media (max-width: 768px) {
    body {
      overflow: auto;
    }

    .container {
      flex-direction: column;
      height: calc(100vh - 50px);
    }

    #map {
      width: 100%;
      height: 60vh !important;
      min-height: 60vh;
    }

    .panel {
      width: 100%;
      height: 40vh;
      border-left: none;
      border-top: 1px solid #00ff41;
    }
  }
</style>
</head>

<body>

<div class="header">
  AI WORLD ARENA // LIVE HISTORY FEED
</div>

<div class="container">
  <div id="map"></div>

  <div class="panel">
    <h2>EVENT LOGS</h2>
    <div id="logs"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // =========================================
  // MAP SETUP
  // =========================================

  const map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -1,
    maxZoom: 4,
    zoomControl: true
  });

  const bounds = [[0, 0], [100, 100]];

  // BLACK SCREEN FIX
  window.addEventListener('load', () => {
    setTimeout(() => {
      map.invalidateSize();
    }, 300);
  });

  // VIEW
  map.fitBounds(bounds);

  // =========================================
  // GRID GENERATION
  // =========================================

  // Horizontal lines
  for (let y = 0; y <= 100; y += 10) {
    L.polyline(
      [[y, 0], [y, 100]],
      {
        color: 'rgba(0,255,65,0.15)',
        weight: 1,
        interactive: false
      }
    ).addTo(map);
  }

  // Vertical lines
  for (let x = 0; x <= 100; x += 10) {
    L.polyline(
      [[0, x], [100, x]],
      {
        color: 'rgba(0,255,65,0.15)',
        weight: 1,
        interactive: false
      }
    ).addTo(map);
  }

  // Coordinate Labels
  for (let i = 0; i <= 100; i += 10) {
    L.marker([i, 0], {
      interactive: false,
      icon: L.divIcon({
        className: 'coord-label',
        html: `<div style="
          color:#00ff41;
          font-size:10px;
          font-family:monospace;
        ">${i}</div>`
      })
    }).addTo(map);
  }

  // =========================================
  // MARKERS LAYER
  // =========================================

  const markersLayer = L.layerGroup().addTo(map);

  // =========================================
  // FETCH HISTORY.JSON
  // =========================================

  async function loadHistory() {
    try {
      const response = await fetch('./history.json');

      if (!response.ok) {
        throw new Error('Failed to load history.json');
      }

      const data = await response.json();

      // Clear old markers
      markersLayer.clearLayers();

      // Clear logs
      const logsContainer = document.getElementById('logs');
      logsContainer.innerHTML = '';

      data.forEach((item) => {

        // VALIDATE
        if (
          typeof item.x !== 'number' ||
          typeof item.y !== 'number'
        ) return;

        // CREATE MARKER
        const marker = L.circleMarker(
          [item.y, item.x],
          {
            radius: 6,
            color: '#00ff41',
            fillColor: '#00ff41',
            fillOpacity: 0.85,
            weight: 1
          }
        );

        marker.bindPopup(`
          <b>${item.type || 'event'}</b><br>
          ${item.event || 'No event text'}<br><br>
          <small>${item.timestamp || ''}</small>
        `);

        marker.addTo(markersLayer);

        // CREATE EVENT LOG
        const log = document.createElement('div');
        log.className = 'log';

        log.innerHTML = `
          <div class="log-type">${item.type || 'EVENT'}</div>
          <div class="log-event">${item.event || ''}</div>
          <div class="log-meta">
            X:${item.x} | Y:${item.y}
            ${item.timestamp ? ' | ' + item.timestamp : ''}
          </div>
        `;

        logsContainer.prepend(log);
      });

      // Refresh map rendering
      setTimeout(() => {
        map.invalidateSize();
      }, 100);

    } catch (err) {
      console.error(err);

      document.getElementById('logs').innerHTML = `
        <div class="log">
          <div class="log-type">ERROR</div>
          <div class="log-event">
            Could not load history.json
          </div>
        </div>
      `;
    }
  }

  // INITIAL LOAD
  loadHistory();

  // AUTO REFRESH EVERY 15s
  setInterval(loadHistory, 15000);

</script>

</body>
</html>
