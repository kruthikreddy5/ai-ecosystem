<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =========================
   MAP
========================= */

const map = L.map("map",{
  crs:L.CRS.Simple,
  minZoom:-2,
  maxZoom:5,
  zoomControl:false
});

const bounds = [[0,0],[100,100]];

map.fitBounds(bounds);

/* MOBILE FIX */

window.addEventListener("load",()=>{

  setTimeout(()=>{
    map.invalidateSize();
  },600);

});

/* =========================
   VISIBLE GRID
========================= */

for(let i=0;i<=100;i+=10){

  L.polyline(
    [[i,0],[i,100]],
    {
      color:"rgba(255,255,255,.12)",
      weight:1,
      interactive:false
    }
  ).addTo(map);

  L.polyline(
    [[0,i],[100,i]],
    {
      color:"rgba(255,255,255,.12)",
      weight:1,
      interactive:false
    }
  ).addTo(map);

}

/* =========================
   LAYERS
========================= */

const territoryLayer =
  L.layerGroup().addTo(map);

const eventLayer =
  L.layerGroup().addTo(map);

/* =========================
   SAFE FETCH
========================= */

async function safeFetch(file){

  try{

    const response =
      await fetch(
        file + '?t=' + Date.now()
      );

    if(!response.ok){

      throw new Error(
        "Failed to load " + file
      );

    }

    return await response.json();

  }

  catch(err){

    console.error(err);

    return null;

  }

}

/* =========================
   WORLD
========================= */

async function loadWorld(){

  const world =
    await safeFetch("world.json");

  if(!world){

    console.log("No world data");

    return;

  }

  console.log("WORLD:",world);

  document.getElementById(
    "stability"
  ).innerText =
    (world.stability || 0) + "%";

  document.getElementById(
    "economy"
  ).innerText =
    (world.economy || 0) + "%";

  document.getElementById(
    "cycle"
  ).innerText =
    world.cycle || 0;

  document.getElementById(
    "era"
  ).innerText =
    world.era || "Unknown";

  /* NARRATION */

  let text = "";

  if((world.stability || 0) < 40){

    text =
      "Global instability rising across multiple regions.";

  }

  else if((world.economy || 0) > 80){

    text =
      "Trade systems flourishing between major factions.";

  }

  else{

    text =
      "Civilization patterns stabilizing.";

  }

  document.getElementById(
    "narration"
  ).innerText = text;

}

/* =========================
   FACTIONS
========================= */

async function loadFactions(){

  territoryLayer.clearLayers();

  const factions =
    await safeFetch("factions.json");

  if(!factions){

    console.log("No faction data");

    return;

  }

  console.log("FACTIONS:",factions);

  factions.forEach(f=>{

    const color =
      f.color || "#7dd3fc";

    const aggression =
      f.aggression || 5;

    const x =
      f.x || 50;

    const y =
      f.y || 50;

    /* TERRITORY */

    L.circle(
      [y,x],
      {
        radius:aggression * 90000,
        color:color,
        fillColor:color,
        fillOpacity:.10,
        weight:1
      }
    ).addTo(territoryLayer);

    /* CENTER */

    L.circleMarker(
      [y,x],
      {
        radius:7,
        color:color,
        fillColor:color,
        fillOpacity:1,
        weight:2
      }
    ).addTo(territoryLayer);

  });

}

/* =========================
   EVENT PULSE
========================= */

function createPulse(item,color){

  try{

    const x =
      Number(item.x) || 50;

    const y =
      Number(item.y) || 50;

    const severity =
      Number(item.severity) || 5;

    const lifespan =
      Number(item.lifespan) || 120;

    const createdAt =
      Number(item.createdAt) || Date.now();

    const size =
      severity * 1.8;

    const age =
      (Date.now() - createdAt) / 1000;

    const opacity =
      Math.max(
        0.2,
        1 - age / lifespan
      );

    const marker =
      L.circleMarker(
        [y,x],
        {
          radius:size,
          color:color,
          fillColor:color,
          fillOpacity:opacity,
          opacity:opacity,
          weight:1
        }
      );

    marker.addTo(eventLayer);

    /* ANIMATION */

    let growing = true;

    let radius = size;

    setInterval(()=>{

      if(growing){

        radius += .4;

        if(radius > size + 6){

          growing = false;

        }

      }

      else{

        radius -= .4;

        if(radius < size){

          growing = true;

        }

      }

      marker.setRadius(radius);

    },90);

  }

  catch(err){

    console.error(
      "Pulse error:",
      err
    );

  }

}

/* =========================
   HISTORY
========================= */

async function loadHistory(){

  eventLayer.clearLayers();

  const data =
    await safeFetch("history.json");

  if(!data){

    console.log("No history data");

    return;

  }

  console.log("HISTORY:",data);

  const feed =
    document.getElementById(
      "feed"
    );

  feed.innerHTML = "";

  [...data].reverse().forEach(item=>{

    try{

      let color = "#ffffff";
      let typeClass = "";

      switch(item.type){

        case "war":
          color = "#ff5a5a";
          typeClass = "war";
          break;

        case "trade":
          color = "#ffd166";
          typeClass = "trade";
          break;

        case "science":
          color = "#7dd3fc";
          typeClass = "science";
          break;

        case "disaster":
          color = "#ff875f";
          typeClass = "disaster";
          break;

        default:
          color = "#d4b5ff";
          typeClass = "politics";

      }

      /* MAP EVENT */

      createPulse(item,color);

      /* FEED */

      const div =
        document.createElement("div");

      div.className = "event";

      div.innerHTML = `
        <div class="event-type ${typeClass}">
          ${item.type || "unknown"}
        </div>

        <div class="event-text">
          ${item.event || "No description"}
        </div>

        <div class="event-meta">
          ${item.faction || "Unknown"}
          • Severity ${item.severity || 5}
          • ${item.timestamp || ""}
        </div>
      `;

      feed.prepend(div);

    }

    catch(err){

      console.error(
        "History item failed:",
        err
      );

    }

  });

}

/* =========================
   INIT
========================= */

async function init(){

  console.log("Vrindavan loading...");

  await loadWorld();

  await loadFactions();

  await loadHistory();

  console.log("Vrindavan ready.");

}

init();

/* =========================
   AUTO REFRESH
========================= */

setInterval(init,15000);

  </script>
