<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Vrindavan — World Engine</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#05070d;
  font-family:Inter,system-ui,sans-serif;
  color:white;
}

/* BACKGROUND */

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top,#132238 0%,#05070d 60%),
    linear-gradient(to bottom,#08111f,#05070d);
  z-index:-3;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.02),
      rgba(255,255,255,0.02) 1px,
      transparent 1px,
      transparent 3px
    );
  opacity:.15;
  pointer-events:none;
  z-index:-1;
}

/* MAIN */

.app{
  display:flex;
  width:100%;
  height:100vh;
}

/* MAP */

#map{
  flex:1;
  height:100%;
  background:#05070d;
  position:relative;
}

/* PANEL */

.panel{
  width:350px;
  height:100%;
  background:rgba(5,10,18,0.88);
  backdrop-filter:blur(18px);
  border-left:1px solid rgba(255,255,255,.08);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */

.header{
  padding:22px;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.title{
  font-size:26px;
  font-weight:700;
  letter-spacing:1px;
}

.subtitle{
  margin-top:6px;
  color:rgba(255,255,255,.5);
  font-size:13px;
}

/* STATUS */

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:20px;
}

.stat{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  border-radius:18px;
  padding:14px;
}

.stat-label{
  font-size:11px;
  color:rgba(255,255,255,.45);
  margin-bottom:6px;
  text-transform:uppercase;
}

.stat-value{
  font-size:20px;
  font-weight:700;
}

/* FEED */

.feed{
  flex:1;
  overflow-y:auto;
  padding:18px;
}

.feed-title{
  margin-bottom:14px;
  font-size:14px;
  color:rgba(255,255,255,.5);
  letter-spacing:1px;
  text-transform:uppercase;
}

.event{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
  animation:fade .5s ease;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.event-type{
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:8px;
}

.event-text{
  font-size:14px;
  line-height:1.5;
  color:rgba(255,255,255,.85);
}

.event-meta{
  margin-top:12px;
  font-size:11px;
  color:rgba(255,255,255,.4);
}

/* TYPE COLORS */

.war{
  color:#ff4d4d;
}

.trade{
  color:#ffd166;
}

.science{
  color:#7dd3fc;
}

.disaster{
  color:#ff7b54;
}

.politics{
  color:#d4b5ff;
}

/* LEAFLET */

.leaflet-container{
  background:#05070d !important;
}

.leaflet-control-attribution{
  display:none;
}

/* ATMOSPHERE */

.atmosphere{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center,
    transparent 40%,
    rgba(0,0,0,.45));
  pointer-events:none;
  z-index:400;
}

/* MOBILE */

@media(max-width:900px){

  .app{
    flex-direction:column;
  }

  #map{
    width:100%;
    height:60vh !important;
    min-height:60vh;
  }

  .panel{
    width:100%;
    height:40vh;
    border-left:none;
    border-top:1px solid rgba(255,255,255,.08);
  }

}

</style>
</head>

<body>

<div class="app">

  <div id="map">
    <div class="atmosphere"></div>
  </div>

  <div class="panel">

    <div class="header">
      <div class="title">Vrindavan</div>
      <div class="subtitle">
        Synthetic Civilization Observation Layer
      </div>
    </div>

    <div class="stats">

      <div class="stat">
        <div class="stat-label">Conflicts</div>
        <div class="stat-value" id="conflicts">0</div>
      </div>

      <div class="stat">
        <div class="stat-label">Events</div>
        <div class="stat-value" id="events">0</div>
      </div>

      <div class="stat">
        <div class="stat-label">Stability</div>
        <div class="stat-value">72%</div>
      </div>

      <div class="stat">
        <div class="stat-label">Dominant</div>
        <div class="stat-value">Helios</div>
      </div>

    </div>

    <div class="feed">
      <div class="feed-title">World Feed</div>
      <div id="feed"></div>
    </div>

  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* MAP */

const map = L.map("map",{
  crs:L.CRS.Simple,
  minZoom:-2,
  maxZoom:5,
  zoomControl:false
});

const bounds = [[0,0],[100,100]];
map.fitBounds(bounds);

/* FIX MOBILE BLACK SCREEN */

window.addEventListener("load",()=>{

  setTimeout(()=>{
    map.invalidateSize();
  },400);

});

/* GRID */

for(let i=0;i<=100;i+=10){

  L.polyline(
    [[i,0],[i,100]],
    {
      color:"rgba(255,255,255,.05)",
      weight:1,
      interactive:false
    }
  ).addTo(map);

  L.polyline(
    [[0,i],[100,i]],
    {
      color:"rgba(255,255,255,.05)",
      weight:1,
      interactive:false
    }
  ).addTo(map);

}

/* MARKERS */

const layer = L.layerGroup().addTo(map);

/* CREATE PULSE */

function createPulse(y,x,color,size=12){

  const marker = L.circleMarker([y,x],{
    radius:size,
    color:color,
    fillColor:color,
    fillOpacity:.2,
    weight:1
  });

  marker.addTo(layer);

  let growing = true;
  let radius = size;

  setInterval(()=>{

    if(growing){
      radius += .5;
      if(radius > size + 8){
        growing = false;
      }
    }else{
      radius -= .5;
      if(radius < size){
        growing = true;
      }
    }

    marker.setRadius(radius);

  },80);

  return marker;
}

/* FETCH HISTORY */

async function loadHistory(){

  try{

    const response = await fetch('./history.json');

    const data = await response.json();

    layer.clearLayers();

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    let conflictCount = 0;

    data.reverse().forEach(item=>{

      let color = "#ffffff";
      let typeClass = "";

      switch(item.type){

        case "war":
          color = "#ff4d4d";
          typeClass = "war";
          conflictCount++;
          break;

        case "trade":
          color = "#ffd166";
          typeClass = "trade";
          break;

        case "science":
          color = "#7dd3fc";
          typeClass = "science";
          break;

        case "disaster":
          color = "#ff7b54";
          typeClass = "disaster";
          break;

        default:
          color = "#d4b5ff";
          typeClass = "politics";

      }

      /* PULSE */

      const pulse = createPulse(
        item.y,
        item.x,
        color,
        8
      );

      pulse.bindPopup(`
        <div style="
          color:white;
          font-family:sans-serif;
        ">
          <b>${item.type}</b><br><br>
          ${item.event}<br><br>
          ${item.timestamp}
        </div>
      `);

      /* FEED */

      const div = document.createElement("div");

      div.className = "event";

      div.innerHTML = `
        <div class="event-type ${typeClass}">
          ${item.type}
        </div>

        <div class="event-text">
          ${item.event}
        </div>

        <div class="event-meta">
          X:${item.x} • Y:${item.y}
          • ${item.timestamp}
        </div>
      `;

      feed.prepend(div);

    });

    document.getElementById("events").innerText =
      data.length;

    document.getElementById("conflicts").innerText =
      conflictCount;

  }catch(err){

    console.error(err);

  }

}

/* LOAD */

loadHistory();

/* AUTO REFRESH */

setInterval(loadHistory,15000);

</script>

</body>
</html>
