<!DOCTYPE html>
<html>
<head>
    <title>AI World Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: monospace; margin: 0; }
        #map { height: 70vh; background: #111; border-bottom: 2px wavy #00ff41; }
        #summary { padding: 20px; height: 30vh; overflow-y: auto; background: #050505; }
        .log-entry { border-left: 2px solid #00ff41; padding-left: 10px; margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="summary"><h3>World Timeline</h3><div id="logs"></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -1 });
        const bounds = [[0,0], [100,100]];
        map.fitBounds(bounds);

        async function updateMap() {
            const res = await fetch('history.json');
            const data = await res.json();
            const logs = document.getElementById('logs');
            logs.innerHTML = '';

            data.forEach(point => {
                L.circleMarker([point.y, point.x], { color: '#00ff41', radius: 5 }).addTo(map)
                    .bindPopup(point.event);
                
                logs.innerHTML = `<div class="log-entry"><b>${point.timestamp}</b>: ${point.event}</div>` + logs.innerHTML;
            });
        }
        updateMap();
        setInterval(updateMap, 60000);
    </script>
</body>
</html>
