<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vrindavan</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background-glow"></div>

<div class="topbar">

  <div class="logo">
    VRINDAVAN
  </div>

  <div class="status">
    SYNTHETIC CIVILIZATION ACTIVE
  </div>

  <div class="clock" id="clock">
    00:00
  </div>

</div>

<div class="main">

  <!-- LEFT -->
  <div class="planet-section">

    <div class="planet-container">

      <img
        src="./assets/world-map.png"
        class="world-map"
        id="worldMap"
      >

      <div id="eventLayer"></div>

    </div>

  </div>

  <!-- RIGHT -->
  <div class="side-panel">

    <div class="panel-block">

      <div class="panel-title">
        WORLD STATUS
      </div>

      <div class="stats">

        <div class="card">
          <span>Stability</span>
          <h2 id="stability">0%</h2>
        </div>

        <div class="card">
          <span>Economy</span>
          <h2 id="economy">0%</h2>
        </div>

        <div class="card">
          <span>Era</span>
          <h2 id="era">Genesis</h2>
        </div>

        <div class="card">
          <span>Cycle</span>
          <h2 id="cycle">0</h2>
        </div>

      </div>

    </div>

    <div class="panel-block">

      <div class="panel-title">
        AI THOUGHTS
      </div>

      <div id="thoughtFeed"></div>

    </div>

    <div class="panel-block">

      <div class="panel-title">
        WORLD EVENTS
      </div>

      <div id="eventFeed"></div>

    </div>

  </div>

</div>

<div class="bottom-controls">

  <button onclick="setMode('political')">
    Political
  </button>

  <button onclick="setMode('war')">
    War
  </button>

  <button onclick="setMode('economy')">
    Economy
  </button>

  <button onclick="setMode('social')">
    Social
  </button>

</div>

<script src="app.js"></script>

</body>
</html>
