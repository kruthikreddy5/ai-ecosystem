<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Vrindavan — Synthetic Earth</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#02050b;
  font-family:Inter,system-ui,sans-serif;
  color:white;
}

/* BACKGROUND */

body{
  background:
    radial-gradient(circle at top,
    #122033 0%,
    #050914 45%,
    #010203 100%);
}

/* STARS */

.stars{
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(white .8px, transparent .8px);
  background-size:120px 120px;
  opacity:.08;
  pointer-events:none;
}

/* GRID OVERLAY */

.scanlines{
  position:fixed;
  inset:0;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.015),
      rgba(255,255,255,.015) 1px,
      transparent 1px,
      transparent 4px
    );
  pointer-events:none;
  z-index:999;
}

/* APP */

.app{
  display:flex;
  width:100%;
  height:100vh;
}

/* MAP */

#map{
  flex:1;
  height:100%;
  position:relative;
  background:#050914;
}

/* ATMOSPHERE */

.atmosphere{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center,
    transparent 45%,
    rgba(0,0,0,.55));
  pointer-events:none;
  z-index:500;
}

/* RIGHT PANEL */

.panel{
  width:360px;
  height:100%;
  background:rgba(7,12,20,.88);
  backdrop-filter:blur(24px);
  border-left:1px solid rgba(255,255,255,.05);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */

.header{
  padding:28px;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.title{
  font-size:30px;
  font-weight:700;
  letter-spacing:1px;
}

.subtitle{
  margin-top:8px;
  color:rgba(255,255,255,.45);
  font-size:13px;
  line-height:1.5;
}

/* STATS */

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:20px;
}

.stat{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  border-radius:20px;
  padding:16px;
}

.stat-label{
  font-size:11px;
  text-transform:uppercase;
  color:rgba(255,255,255,.4);
  margin-bottom:8px;
}

.stat-value{
  font-size:24px;
  font-weight:700;
}

/* NARRATION */

.narration{
  margin:0 20px 20px;
  padding:18px;
  border-radius:20px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.04);
  color:rgba(255,255,255,.7);
  line-height:1.6;
  font-size:14px;
}

/* FEED */

.feed{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.feed-title{
  color:rgba(255,255,255,.4);
  margin-bottom:14px;
  text-transform:uppercase;
  font-size:12px;
  letter-spacing:1px;
}

.event{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  border-radius:20px;
  padding:18px;
  margin-bottom:14px;
  animation:fade .5s ease;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.event-type{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:10px;
}

.event-text{
  font-size:14px;
  line-height:1.6;
  color:rgba(255,255,255,.85);
}

.event-meta{
  margin-top:12px;
  font-size:11px;
  color:rgba(255,255,255,.35);
}

/* COLORS */

.war{
  color:#ff5a5a;
}

.trade{
  color:#ffd166;
}

.science{
  color:#7dd3fc;
}

.disaster{
  color:#ff875f;
}

.politics{
  color:#d4b5ff;
}

/* LEAFLET */

.leaflet-container{
  background:#050914 !important;
}

.leaflet-control-attribution{
  display:none;
}

/* MOBILE */

@media(max-width:900px){

  .app{
    flex-direction:column;
  }

  #map{
    width:100%;
    height:60vh !important;
    min-height:60vh;
  }

  .panel{
    width:100%;
    height:40vh;
    border-left:none;
    border-top:1px solid rgba(255,255,255,.06);
  }

}

</style>
</head>

<body>

<div class="stars"></div>
<div class="scanlines"></div>

<div class="app">

  <div id="map">
    <div class="atmosphere"></div>
  </div>

  <div class="panel">

    <div class="header">

      <div class="title">
        Vrindavan
      </div>

      <div class="subtitle">
        Synthetic civilization observation layer.<br>
        Monitoring geopolitical evolution in real time.
      </div>

    </div>

    <div class="stats">

      <div class="stat">
        <div class="stat-label">Stability</div>
        <div class="stat-value" id="stability">0%</div>
      </div>

      <div class="stat">
        <div class="stat-label">Economy</div>
        <div class="stat-value" id="economy">0%</div>
      </div>

      <div class="stat">
        <div class="stat-label">Cycle</div>
        <div class="stat-value" id="cycle">0</div>
      </div>

      <div class="stat">
        <div class="stat-label">Era</div>
        <div class="stat-value" id="era">
          Emergence
        </div>
      </div>

    </div>

    <div class="narration" id="narration">
      Civilization patterns stabilizing.
    </div>

    <div class="feed">

      <div class="feed-title">
        World Feed
      </div>

      <div id="feed"></div>

    </div>

  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* MAP */

const map = L.map("map",{
  crs:L.CRS.Simple,
  minZoom:-2,
  maxZoom:5,
  zoomControl:false
});

const bounds = [[0,0],[100,100]];

map.fitBounds(bounds);

/* FIX MOBILE */

window.addEventListener("load",()=>{

  setTimeout(()=>{
    map.invalidateSize();
  },400);

});

/* GRID */

for(let i=0;i<=100;i+=10){

  L.polyline(
    [[i,0],[i,100]],
    {
      color:"rgba(255,255,255,.03)",
      weight:1,
      interactive:false
    }
  ).addTo(map);

  L.polyline(
    [[0,i],[100,i]],
    {
      color:"rgba(255,255,255,.03)",
      weight:1,
      interactive:false
    }
  ).addTo(map);

}

/* LAYERS */

const territoryLayer =
  L.layerGroup().addTo(map);

const eventLayer =
  L.layerGroup().addTo(map);

/* LOAD WORLD */

async function loadWorld(){

  const response =
    await fetch('./world.json');

  const world =
    await response.json();

  document.getElementById(
    "stability"
  ).innerText =
    world.stability + "%";

  document.getElementById(
    "economy"
  ).innerText =
    world.economy + "%";

  document.getElementById(
    "cycle"
  ).innerText =
    world.cycle;

  document.getElementById(
    "era"
  ).innerText =
    world.era;

  /* NARRATION */

  let text = "";

  if(world.stability < 40){

    text =
    "Global instability rising across multiple sectors.";

  }

  else if(world.economy > 80){

    text =
    "Trade networks flourishing between major factions.";

  }

  else{

    text =
    "Civilization patterns stabilizing.";

  }

  document.getElementById(
    "narration"
  ).innerText = text;

}

/* LOAD FACTIONS */

async function loadFactions(){

  territoryLayer.clearLayers();

  const response =
    await fetch('./factions.json');

  const factions =
    await response.json();

  factions.forEach(f=>{

    /* TERRITORY */

    L.circle(
      [f.y,f.x],
      {
        radius:f.aggression * 80000,
        color:f.color,
        fillColor:f.color,
        fillOpacity:.08,
        weight:1
      }
    ).addTo(territoryLayer);

    /* CENTER */

    L.circleMarker(
      [f.y,f.x],
      {
        radius:6,
        color:f.color,
        fillColor:f.color,
        fillOpacity:1,
        weight:2
      }
    ).addTo(territoryLayer);

  });

}

/* CREATE PULSE */

function createPulse(item,color){

  const size =
    item.severity * 1.8;

  const age =
    (Date.now() -
    item.createdAt) / 1000;

  const opacity =
    Math.max(
      0.15,
      1 - age / item.lifespan
    );

  const marker =
    L.circleMarker(
      [item.y,item.x],
      {
        radius:size,
        color:color,
        fillColor:color,
        fillOpacity:opacity,
        opacity:opacity,
        weight:1
      }
    );

  marker.addTo(eventLayer);

  let growing = true;

  let radius = size;

  setInterval(()=>{

    if(growing){

      radius += .5;

      if(radius > size + 6){

        growing = false;

      }

    }

    else{

      radius -= .5;

      if(radius < size){

        growing = true;

      }

    }

    marker.setRadius(radius);

  },90);

}

/* LOAD HISTORY */

async function loadHistory(){

  eventLayer.clearLayers();

  const response =
    await fetch('./history.json');

  const data =
    await response.json();

  const feed =
    document.getElementById(
      "feed"
    );

  feed.innerHTML = "";

  data.reverse().forEach(item=>{

    let color = "#ffffff";
    let typeClass = "";

    switch(item.type){

      case "war":
        color = "#ff5a5a";
        typeClass = "war";
        break;

      case "trade":
        color = "#ffd166";
        typeClass = "trade";
        break;

      case "science":
        color = "#7dd3fc";
        typeClass = "science";
        break;

      case "disaster":
        color = "#ff875f";
        typeClass = "disaster";
        break;

      default:
        color = "#d4b5ff";
        typeClass = "politics";

    }

    createPulse(item,color);

    /* FEED CARD */

    const div =
      document.createElement("div");

    div.className = "event";

    div.innerHTML = `
      <div class="event-type ${typeClass}">
        ${item.type}
      </div>

      <div class="event-text">
        ${item.event}
      </div>

      <div class="event-meta">
        ${item.faction}
        • Severity ${item.severity}
        • ${item.timestamp}
      </div>
    `;

    feed.prepend(div);

  });

}

/* INIT */

async function init(){

  await loadWorld();

  await loadFactions();

  await loadHistory();

}

init();

/* AUTO REFRESH */

setInterval(init,15000);

</script>

</body>
  </html>
