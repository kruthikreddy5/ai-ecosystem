<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI World Observer</title>
    <style>
        body { background: #0f0f0f; color: #00ff41; font-family: monospace; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; }
        h1 { border-bottom: 2px wavy #00ff41; padding-bottom: 10px; }
        .event { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 5px; border-left: 3px solid #00ff41; }
        .time { color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kruthik's AI World: Observation Deck</h1>
        <div id="logs">Loading logs from the void...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        async function loadHistory() {
            // This fetches your history.md file directly from GitHub
            const response = await fetch('history.md');
            const text = await response.text();
            // Converts Markdown to HTML
            document.getElementById('logs').innerHTML = marked.parse(text);
        }
        loadHistory();
        setInterval(loadHistory, 60000); // Refreshes every minute
    </script>
</body>
</html>
