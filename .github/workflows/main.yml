name: AI World Heartbeat

on:
  schedule:
    - cron: '0 * * * *' # Wakes up every 1 hour
  workflow_dispatch:      # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node index.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Save History
        run: |
          git config --global user.name 'AI World Bot'
          git config --global user.email 'bot@aiworld.com'
          git add history.md
          git commit -m "AI Update: $(date)" || echo "No changes to commit"
          git push origin main
          
    
