name: AI World Heartbeat
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node index.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Commit changes
        run: |
          git config --global user.name 'World-Bot'
          git config --global user.email 'bot@world.com'
          git add history.json
          git commit -m "World Update: $(date)" || echo "No changes"
          git push
          
