name: Vrindavan Evolution Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  evolve:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node index.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit changes
        run: |
          git config --global user.name 'Vrindavan-AI'
          git config --global user.email 'ai@vrindavan.world'
          git add .
          git commit -m "World Cycle $(date)" || echo "No changes"
          git push
